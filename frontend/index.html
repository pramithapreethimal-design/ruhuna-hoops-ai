<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruhuna Hoops Team AI Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌙</button>

    <div class="container py-5">
        <div class="card mx-auto" style="max-width: 800px;">
        <div class="card-header text-center">
    <h2 class="mb-0"> Ruhuna Basketball AI</h2>
    <p class="mb-0 opacity-75 small">Predict Inter-Faculty Basketball Tournament Points</p>
</div>
            <div class="card-body p-4">
                <form id="predictionForm">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="practice" class="form-label"> Weekly Practice Hours</label>
                            <input type="number" id="practice" class="form-control" min="5" max="20" step="0.5" value="12.0" required>
                        </div>
                        <div class="col-md-6">
                            <label for="players" class="form-label"> Total Team Players</label>
                            <input type="number" id="players" class="form-control" min="5" max="15" step="1" value="12" required>
                        </div>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="assists" class="form-label"> Total Team Assists</label>
                            <input type="number" id="assists" class="form-control" min="20" max="100" step="1" value="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="rebounds" class="form-label"> Total Team Rebounds</label>
                            <input type="number" id="rebounds" class="form-control" min="40" max="130" step="1" value="80" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2" id="predictBtn">
                        <span class="btn-text"> Predict Tournament Points</span>
                    </button>
                </form>

                <div id="result-box" class="alert mt-4 text-center d-none" role="alert">
                    <h4 class="mb-1"> Predicted Tournament Points</h4>
                    <h1 class="display-5 fw-bold mb-0" id="final-score">--</h1>
                </div>
            </div>
            <div class="card-footer text-center text-muted small py-3">
                Built for Ruhuna basketball • <a href="#" id="resetBtn" class="text-decoration-none">Reset</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
